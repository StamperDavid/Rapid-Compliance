name: Deploy Firestore Indexes

# Auto-deploys composite indexes whenever firestore.indexes.json changes on
# main. Stops the recurring "FAILED_PRECONDITION: index required" errors that
# previously needed manual click-through in Firebase Console every time
# someone added a new query that needed a composite index.
#
# One-time setup required (cannot be automated — interactive auth):
#   1. Run `firebase login:ci` in a local terminal authenticated as the
#      Firebase project owner. It opens a browser, you authorize, it prints
#      a long-lived token (does NOT expire on its own — only manual revoke).
#   2. Add that token as a GitHub repository secret named `FIREBASE_TOKEN`
#      (Settings → Secrets and variables → Actions → New repository secret).
#   3. After that, every push to main that touches firestore.indexes.json
#      will deploy the indexes automatically.

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.indexes.json'
      - '.github/workflows/firestore-indexes.yml'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify FIREBASE_TOKEN secret is configured
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "::error::FIREBASE_TOKEN secret not set. See the comment block at the top of this workflow file for one-time setup instructions."
            exit 1
          fi
          echo "FIREBASE_TOKEN is configured. Proceeding."

      - name: Deploy Firestore indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --only firestore:indexes \
            --project rapid-compliance-65f87 \
            --token "$FIREBASE_TOKEN" \
            --non-interactive
